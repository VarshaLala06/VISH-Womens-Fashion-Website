<script>

const params=new URLSearchParams(window.location.search);

const id=parseInt(params.get("id"));

const product=allproducts.find(p=>p.id===id);

let html=`

<div class="col-md-6">

<img src="${product.image}" class="product-img">

</div>

<div class="col-md-6">

<div class="box">

<h2>${product.name}</h2>

<h5 class="text-muted">${product.category}</h5>

<hr>

<div class="price">

₹${product.price}

</div>

<p class="mt-4">

${product.description}

</p>

<p>

<b>Collection:</b>

${product.collection}

</p>

<div class="d-grid gap-3 mt-4">

${
isInCart(product.id)

?

`<button class="btn btn-success" disabled>

✔ Added To Cart

</button>`

:

`<button
class="btn btn-dark"
onclick="addToCart(${product.id})">

Add To Cart

</button>`
}

${
isInWishlist(product.id)

?

`<button class="btn btn-success" disabled>

❤ Added To Wishlist

</button>`

:

`<button
class="btn btn-outline-danger"
onclick="addWishlist(${product.id})">

❤ Add To Wishlist

</button>`
}

</div>

</div>

</div>

`;

document.getElementById("product").innerHTML=html;

function isInCart(id){

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if(!user) return false;

    const cart = JSON.parse(localStorage.getItem(`cart_${user.id}`)) || [];

    return cart.some(item => Number(item.id) === Number(id));

}

function isInWishlist(id){

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if(!user) return false;

    const wishlist = JSON.parse(localStorage.getItem(`wishlist_${user.id}`)) || [];

    return wishlist.some(item => Number(item.id) === Number(id));

}

function addToCart(id){

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if(!user){

        alert("Please Login First");
        window.location.href = "login.html";
        return;

    }

    let cart = JSON.parse(localStorage.getItem(`cart_${user.id}`)) || [];

    const item = cart.find(i => i.id === id);

    if(item){

        item.quantity++;

    }else{

        cart.push({
            ...product,
            quantity:1
        });

    }

    localStorage.setItem(`cart_${user.id}`, JSON.stringify(cart));

location.reload();

}


function addWishlist(id){

    const user = JSON.parse(localStorage.getItem("currentUser"));

    if(!user){

        alert("Please Login First");
        window.location.href = "login.html";
        return;

    }

    let wishlist = JSON.parse(localStorage.getItem(`wishlist_${user.id}`)) || [];

    const exists = wishlist.find(item => item.id === id);

    if(exists){

        alert("Already in Wishlist");
        return;

    }

    wishlist.push(product);

    localStorage.setItem(`wishlist_${user.id}`, JSON.stringify(wishlist));

location.reload();

}

const loggedInUser = JSON.parse(localStorage.getItem("currentUser"));

if(loggedInUser){

    document.getElementById("accountBtn").innerHTML = loggedInUser.name;

}

function accountAction(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(currentUser){

        window.location.href = "profile.html";

    }
    else{

        window.location.href = "login.html";

    }

}
</script>
