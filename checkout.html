<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f4ef;
}

.navbar{
    background:burlywood;
}

.navbar-brand{
    color:white!important;
    font-size:32px;
    font-weight:bold;
    letter-spacing:5px;
}

.checkout-box,
.summary{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.summary img{
    width:70px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:#b8860b;
    font-weight:bold;
}
@media (max-width:768px){

.title{
    font-size:32px;
}

.hero h1{
    font-size:40px;
}

.product-img{
    height:400px;
}

.card img{
    height:300px;
}

.profile-card{
    padding:20px;
}

.stats{
    flex-direction:column;
}

.navbar-brand{
    font-size:1.6rem;
}

}
</style>

</head>

<body>

<nav class="navbar">

<div class="container">

<a href="index.html" class="navbar-brand">
VISH
</a>

</div>

</nav>

<div class="container my-5">

<div class="row">

<div class="col-lg-8">

<div class="checkout-box">

<h3 class="mb-4">
Shipping Address
</h3>

<input
type="text"
id="name"
class="form-control mb-3"
placeholder="Full Name">

<input
type="text"
id="phone"
class="form-control mb-3"
placeholder="Phone Number">

<textarea
id="address"
class="form-control mb-3"
rows="4"
placeholder="Complete Address"></textarea>

<input
type="text"
id="city"
class="form-control mb-3"
placeholder="City">

<input
type="text"
id="pincode"
class="form-control mb-3"
placeholder="Pincode">

<hr>

<h3 class="mb-4">
Payment Method
</h3>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment"
value="Cash on Delivery"
checked>

<label class="form-check-label">

Cash on Delivery

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment"
value="UPI">

<label class="form-check-label">

UPI

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment"
value="Credit Card">

<label class="form-check-label">

Credit/Debit Card

</label>

</div>

<div class="mt-4">

<input
class="form-control"
placeholder="Coupon Code">

</div>

</div>

</div>

<div class="col-lg-4">

<div class="summary">

<h3>
Order Summary
</h3>

<hr>

<div id="orderItems"></div>

<hr>

<h4>

Total :

₹<span id="totalPrice">0</span>

</h4>

<button
class="btn btn-dark w-100 mt-3"
onclick="placeOrder()">

Place Order

</button>

</div>

</div>

</div>

</div>

<script>

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

let cart=[];

if(currentUser){

cart=JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

}

let total=0;

function loadSummary(){

let data="";

cart.forEach(item=>{

total+=item.price*item.quantity;

data+=`

<div class="d-flex mb-3">

<img src="${item.image}">

<div class="ms-3">

<h6>${item.name}</h6>

<p class="mb-1">

Qty : ${item.quantity}

</p>

<div class="price">

₹${item.price*item.quantity}

</div>

</div>

</div>

`;

});

document.getElementById("orderItems").innerHTML=data;

document.getElementById("totalPrice").innerHTML=total;

}

loadSummary();

function placeOrder(){

const name=document.getElementById("name").value;

const phone=document.getElementById("phone").value;

const address=document.getElementById("address").value;

const city=document.getElementById("city").value;

const pincode=document.getElementById("pincode").value;

if(name==""||phone==""||address==""||city==""||pincode==""){

alert("Please fill all fields");

return;

}

const payment=document.querySelector('input[name="payment"]:checked').value;

const order={

customer:name,

phone,

address,

city,

pincode,

payment,

products:cart,

total,

date:new Date().toLocaleString()

};

let orders=JSON.parse(localStorage.getItem(`orders_${currentUser.id}`)) || [];

orders.push(order);

localStorage.setItem(`orders_${currentUser.id}`,JSON.stringify(orders));

localStorage.removeItem(`cart_${currentUser.id}`);

alert("🎉 Order Placed Successfully!");

window.location.href="orderSuccess.html";

}

</script>

</body>
</html>
