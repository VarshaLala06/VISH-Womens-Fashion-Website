<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VISH Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f4ef;
}

.navbar{
    background:burlywood;
}

.navbar-brand{
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: white !important;
    font-family: Georgia, serif;
    text-transform: uppercase;
}

.title{
    text-align:center;
    margin:40px 0;
    color:#b8860b;
    font-weight:bold;
}

.card img{
    height:180px;
    object-fit:cover;
}

.qty-btn{
    width:40px;
}

.total-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    position:sticky;
    top:20px;
}
@media (max-width:768px){

.title{
    font-size:32px;
}

.hero h1{
    font-size:40px;
}

.product-img{
    height:400px;
}

.card img{
    height:300px;
}

.profile-card{
    padding:20px;
}

.stats{
    flex-direction:column;
}

.navbar-brand{
    font-size:1.6rem;
}
@media (max-width:768px){

.card .row{
    display:block;
}

.card .col-md-4,
.card .col-md-8{
    width:100%;
    max-width:100%;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:12px 12px 0 0;
}

.card-body{
    padding:20px;
}

.qty-btn{
    width:45px;
    height:45px;
}

}
}
</style>

</head>
<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a href="index.html" class="navbar-brand">
VISH
</a>

<div>

<button
class="btn text-white"
onclick="history.back()">

Continue Shopping

</button>

</div>

</div>

</nav>

<h1 class="title">
My Shopping Cart
</h1>

<div class="container">

<div class="row">

<div class="col-lg-8">

<div id="cartItems"></div>

</div>

<div class="col-lg-4">

<div class="total-box">

<h3>Cart Summary</h3>

<hr>

<p>
Total Items :
<strong id="items">0</strong>
</p>

<h4>

Grand Total :

₹<span id="total">0</span>

</h4>

<hr>

<button
class="btn btn-success w-100 mb-3"
onclick="checkout()">

Proceed To Checkout

</button>

<button
class="btn btn-danger w-100"
onclick="clearCart()">

Clear Cart

</button>

</div>

</div>

</div>

</div>

<script>

//===================== LOGIN CHECK =====================

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login First");

window.location.href="login.html";

}

//===================== LOAD USER CART =====================

let cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

//===================== DISPLAY CART =====================

function displayCart(){

const container=document.getElementById("cartItems");

container.innerHTML="";

if(cart.length==0){

container.innerHTML=`

<div class="alert alert-warning text-center">

<h4>Your Cart is Empty</h4>

<a href="index.html" class="btn btn-dark mt-3">

Start Shopping

</a>

</div>

`;

document.getElementById("items").innerHTML=0;

document.getElementById("total").innerHTML=0;

return;

}

let total=0;

let items=0;

cart.forEach(product=>{

items+=product.quantity;

total+=product.price*product.quantity;

container.innerHTML+=`

<div class="card mb-4 shadow">

<div class="row g-0">

<div class="col-md-4">

<img
src="${product.image}"
class="img-fluid rounded-start">

</div>

<div class="col-md-8">

<div class="card-body">

<h4>${product.name}</h4>

<p>${product.category}</p>

<h5>₹${product.price}</h5>

<div class="d-flex align-items-center mb-3">

<button
class="btn btn-dark qty-btn"

onclick="decrease(${product.id})">

-

</button>

<span class="mx-3 fs-5">

${product.quantity}

</span>

<button
class="btn btn-dark qty-btn"

onclick="increase(${product.id})">

+

</button>

</div>

<h5>

Subtotal :

₹${product.price*product.quantity}

</h5>

<button

class="btn btn-danger mt-2"

onclick="removeItem(${product.id})">

Remove

</button>

</div>

</div>

</div>

</div>

`;

});

document.getElementById("items").innerHTML=items;

document.getElementById("total").innerHTML=total;

}

//===================== SAVE CART =====================

function saveCart(){

localStorage.setItem(

`cart_${currentUser.id}`,

JSON.stringify(cart)

);

displayCart();

}

//===================== INCREASE =====================

function increase(id){

cart.forEach(product=>{

if(product.id==id){

product.quantity++;

}

});

saveCart();

}

//===================== DECREASE =====================

function decrease(id){

cart.forEach(product=>{

if(product.id==id){

if(product.quantity>1){

product.quantity--;

}

}

});

saveCart();

}

//===================== REMOVE =====================

function removeItem(id){

cart=cart.filter(product=>product.id!=id);

saveCart();

}

//===================== CLEAR CART =====================

function clearCart(){

if(confirm("Are you sure?")){

cart=[];

saveCart();

}

}

//===================== CHECKOUT =====================

function checkout(){

if(cart.length==0){

alert("Your Cart is Empty");

return;

}

window.location.href="checkout.html";

}

//===================== START =====================

displayCart();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
