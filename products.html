<h1 id="Title" class="title"></h1>


<div class="container">

<div class="row">

<div class="col-md-3">

<div class="filter-box">

<h4>Search</h4>

<input
type="text"
id="search"
class="form-control mb-4"
placeholder="Search Products..."
onkeyup="searchProducts()">

<h4>Sort</h4>

<select
class="form-select"
id="sort"
onchange="sortProducts()">

<option value="">Default</option>

<option value="low">
Price : Low to High
</option>

<option value="high">
Price : High to Low
</option>

</select>

</div>

</div>


<div class="col-md-9">

<div class="row" id="products">

</div>

</div>

</div>

</div>


<script src="js/productsData.js"></script>

<script>

let currentProducts=[];



function categories(){

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

const category=params.get("category");

const title=document.getElementById("Title");


if(category){

title.innerHTML=category;

currentProducts=allproducts.filter(product=>

product.category.toLowerCase()==category.toLowerCase()

);

display(currentProducts);

return;

}


const collections=[

"Cafe Aesthetics",

"Wedding Elegance",

"Everyday Casuals",

"Wander Collection",

"Office Essentials",

"Beach Escape",

"Urban Street Style",

"Party Glam",

"Active Motion"

];


const collection=collections[id-1];

title.innerHTML=collection;

currentProducts=allproducts.filter(product=>

product.collection==collection

);

display(currentProducts);

}


function display(products){

let data="";

products.forEach(product=>{

data+=`

<div class="col-lg-4 col-md-6 mb-4">

<div
class="card shadow h-100 product-card"
onclick="viewProduct(${product.id})">

<img
src="${product.image}"
class="card-img-top">

<div class="card-body d-flex flex-column">

<h5 class="fw-bold product-name">

${product.name}

</h5>

<p class="text-muted mb-1">

${product.category}

</p>

<div class="price mb-2">

₹${product.price}

</div>

<p class="text-secondary">

${product.description}

</p>

<div class="mt-auto d-grid gap-2">

<button
class="btn btn-dark"
onclick="event.stopPropagation();addToCart(${product.id})">

Add To Cart

</button>

${
isInWishlist(product.id)

?

`<button
class="btn btn-success w-100"
disabled>

✔ Already in Wishlist

</button>`

:

`<button
class="btn btn-outline-danger w-100"
onclick="addWishlist(${product.id})">

❤ Add To Wishlist

</button>`
}

</div>

</div>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=data;

}


function searchProducts(){

const value=document.getElementById("search").value.toLowerCase();

const filtered=currentProducts.filter(product=>

product.name.toLowerCase().includes(value)

);

display(filtered);

}

function viewProduct(id){

    window.location.href = `productDetails.html?id=${id}`;

}

function sortProducts(){

const value=document.getElementById("sort").value;

let arr=[...currentProducts];

if(value=="low"){

arr.sort((a,b)=>a.price-b.price);

}

else if(value=="high"){

arr.sort((a,b)=>b.price-a.price);

}

display(arr);

}

function viewProduct(id){
    window.location.href = `productDetails.html?id=${id}`;
}

function updateCounts(){

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser) return;

const cart=JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

const wishlist=JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

document.getElementById("cartCount").innerHTML=cart.length;

document.getElementById("wishlistCount").innerHTML=wishlist.length;

}

function goCart(){

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login");

window.location.href="login.html";

return;

}

window.location.href="cart.html";

}

function isInWishlist(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser) return false;

    const wishlist = JSON.parse(
        localStorage.getItem(`wishlist_${currentUser.id}`)
    ) || [];

    return wishlist.some(item => item.id === id);

}

function goWishlist(){

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login");

window.location.href="login.html";

return;

}

window.location.href="wishlist.html";

}

function addToCart(id){

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login First");

window.location.href="login.html";

return;

}

const product=allproducts.find(p=>p.id===id);

let cart=JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

const existing=cart.find(item=>item.id===id);

if(existing){

existing.quantity++;

}
else{

cart.push({
...product,
quantity:1
});

}

localStorage.setItem(`cart_${currentUser.id}`,JSON.stringify(cart));

updateCounts();

alert("Product Added To Cart");

}


function addWishlist(id){

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login First");

window.location.href="login.html";

return;

}

let wishlist=JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

const exists=wishlist.find(item=>item.id===id);

if(exists){

alert("Already in Wishlist");

return;

}

const product=allproducts.find(p=>p.id===id);

wishlist.push(product);

localStorage.setItem(`wishlist_${currentUser.id}`,JSON.stringify(wishlist));

alert("Added To Wishlist");

displayProducts();    

}



categories();
updateCounts();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
