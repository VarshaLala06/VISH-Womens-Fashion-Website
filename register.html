<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | VISH</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f4ef;
}

.navbar{
    background:burlywood;
}

.navbar-brand{
    font-size:2rem;
    font-weight:bold;
    letter-spacing:5px;
    color:white!important;
}

.register-box{
    max-width:450px;
    width:90%;
    margin:70px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#b8860b;
}

.invalid-feedback{
    display:block;
    font-size:14px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a href="index.html" class="navbar-brand">

VISH

</a>

</div>

</nav>

<div class="register-box">

<h2>Create Account</h2>

<div class="mb-3">

<label class="form-label">Name</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter your name"
oninput="validateName()">

<div id="nameError" class="invalid-feedback"></div>

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email"
oninput="validateEmail()">

<div id="emailError" class="invalid-feedback"></div>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter password"
oninput="validatePassword()">

<div id="passwordError" class="invalid-feedback"></div>

</div>

<div class="mb-3">

<label class="form-label">Confirm Password</label>

<input
type="password"
id="confirm"
class="form-control"
placeholder="Confirm password"
oninput="validateConfirm()">

<div id="confirmError" class="invalid-feedback"></div>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="showPassword"
onclick="togglePassword()">

<label
class="form-check-label"
for="showPassword">

Show Password

</label>

</div>

<button
class="btn btn-dark w-100"
onclick="registerUser()">

Register

</button>

<p class="text-center mt-3">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<!-- JavaScript goes here -->
<script>
    function togglePassword(){

    const password=document.getElementById("password");
    const confirm=document.getElementById("confirm");

    if(password.type==="password"){

        password.type="text";
        confirm.type="text";

    }
    else{

        password.type="password";
        confirm.type="password";

    }

}

// ---------------- Name Validation ----------------

function validateName(){

    const name=document.getElementById("name");
    const error=document.getElementById("nameError");

    const regex=/^[A-Za-z ]{3,30}$/;

    if(name.value.trim()==""){

        name.classList.add("is-invalid");
        error.innerHTML="Name is required.";
        return false;

    }

    if(!regex.test(name.value.trim())){

        name.classList.add("is-invalid");
        error.innerHTML="Enter a valid name.";
        return false;

    }

    name.classList.remove("is-invalid");
    error.innerHTML="";
    return true;

}

// ---------------- Email Validation ----------------

function validateEmail(){

    const email=document.getElementById("email");
    const error=document.getElementById("emailError");

    const regex=/^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

    if(email.value.trim()==""){

        email.classList.add("is-invalid");
        error.innerHTML="Email is required.";
        return false;

    }

    if(!regex.test(email.value.trim())){

        email.classList.add("is-invalid");
        error.innerHTML="Enter a valid email address.";
        return false;

    }

    email.classList.remove("is-invalid");
    error.innerHTML="";
    return true;

}

// ---------------- Password Validation ----------------

function validatePassword(){

    const password=document.getElementById("password");
    const error=document.getElementById("passwordError");

    const regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if(password.value==""){

        password.classList.add("is-invalid");
        error.innerHTML="Password is required.";
        return false;

    }

    if(!regex.test(password.value)){

        password.classList.add("is-invalid");
        error.innerHTML="Minimum 8 characters with uppercase, lowercase, number and special character.";
        return false;

    }

    password.classList.remove("is-invalid");
    error.innerHTML="";

    validateConfirm();

    return true;

}

// ---------------- Confirm Password ----------------

function validateConfirm(){

    const password=document.getElementById("password");
    const confirm=document.getElementById("confirm");
    const error=document.getElementById("confirmError");

    if(confirm.value==""){

        confirm.classList.add("is-invalid");
        error.innerHTML="Confirm your password.";
        return false;

    }

    if(password.value!==confirm.value){

        confirm.classList.add("is-invalid");
        error.innerHTML="Passwords do not match.";
        return false;

    }

    confirm.classList.remove("is-invalid");
    error.innerHTML="";
    return true;

}

// ---------------- Register ----------------

function registerUser(){

    const validName=validateName();
    const validEmail=validateEmail();
    const validPassword=validatePassword();
    const validConfirm=validateConfirm();

    if(!(validName && validEmail && validPassword && validConfirm)){

        return;

    }

    const name=document.getElementById("name").value.trim();
    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value;

    let users=JSON.parse(localStorage.getItem("users")) || [];

    const exists=users.find(user=>user.email===email);

    if(exists){

        document.getElementById("email").classList.add("is-invalid");
        document.getElementById("emailError").innerHTML="Email already registered.";
        return;

    }

    const user={

        id:Date.now(),
        name:name,
        email:email,
        password:password

    };

    users.push(user);

    localStorage.setItem("users",JSON.stringify(users));

    alert("Registration Successful!");

    window.location.href="login.html";

}

</script>
</body>

</html>
