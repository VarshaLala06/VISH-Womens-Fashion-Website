<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Order Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f8f4ef;

}

.card img{

height:120px;

object-fit:cover;

}

.timeline{

font-size:18px;

line-height:2;

}

.done{

color:green;

font-weight:bold;

}
@media (max-width:768px){

.title{
    font-size:32px;
}

.hero h1{
    font-size:40px;
}

.product-img{
    height:400px;
}

.card img{
    height:300px;
}

.profile-card{
    padding:20px;
}

.stats{
    flex-direction:column;
}

.navbar-brand{
    font-size:1.6rem;
}

}
</style>

</head>

<body>

<div class="container my-5">

<h2>

Order Details

</h2>

<hr>

<div id="products"></div>

<hr>

<h3>

Tracking

</h3>

<div class="timeline">

<div class="done">

✔ Order Placed

</div>

<div class="done">

✔ Packed

</div>

<div class="done">

✔ Shipped

</div>

<div class="done">

✔ Out For Delivery

</div>

<div class="done">

✔ Delivered

</div>

</div>

</div>

<script>

const currentUser=JSON.parse(localStorage.getItem("currentUser"));

const params=new URLSearchParams(window.location.search);

const index=params.get("index");

const orders=JSON.parse(localStorage.getItem(`orders_${currentUser.id}`));

const order=orders[index];

let html="";

order.products.forEach(item=>{

html+=`

<div class="card mb-3">

<div class="row">

<div class="col-md-3">

<img
src="${item.image}"
class="img-fluid">

</div>

<div class="col-md-9">

<div class="card-body">

<h4>

${item.name}

</h4>

<p>

Quantity :

${item.quantity}

</p>

<p>

₹${item.price}

</p>

</div>

</div>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

</script>

</body>

</html>
