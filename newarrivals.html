<h1 class="title">

✨ New Arrivals ✨

</h1>

<div class="container">

<div class="row" id="products">

</div>

</div>

<script src="js/productsData.js"></script>

<script>

const latestProducts = allproducts.slice(-6).reverse();

displayProducts();
updateNavbar();
updateCounts();

function displayProducts(){

    let data = "";

    latestProducts.forEach(product=>{

        data += `

        <div class="col-lg-4 col-md-6 mb-4">

            <div
            class="card product-card shadow h-100 position-relative"
            onclick="openProduct(${product.id})">

                <div class="badge-new">

                    NEW

                </div>

                <img
                src="${product.image}"
                class="card-img-top">

                <div class="card-body d-flex flex-column">

                    <h5 class="fw-bold">

                        ${product.name}

                    </h5>

                    <p class="text-muted">

                        ${product.category}

                    </p>

                    <div class="price mb-2">

                        ₹${product.price}

                    </div>

                    <p>

                        ${product.description}

                    </p>

                    <div class="mt-auto d-grid gap-2">

                        ${
                        isInCart(product.id)

                        ?

                        `<button
                        class="btn btn-success"
                        disabled>

                        ✔ Added To Cart

                        </button>`

                        :

                        `<button
                        class="btn btn-dark"
                        onclick="event.stopPropagation();addToCart(${product.id})">

                        Add To Cart

                        </button>`
                        }

                        ${
                        isInWishlist(product.id)

                        ?

                        `<button
                        class="btn btn-success"
                        disabled>

                        ❤ Added To Wishlist

                        </button>`

                        :

                        `<button
                        class="btn btn-outline-danger"
                        onclick="event.stopPropagation();addWishlist(${product.id})">

                        ❤ Add To Wishlist

                        </button>`
                        }

                    </div>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("products").innerHTML = data;

}

function openProduct(id){

    window.location.href=`productDetails.html?id=${id}`;

}

function isInCart(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser) return false;

    let cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

    return cart.some(item=>item.id===id);

}

function isInWishlist(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser) return false;

    let wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

    return wishlist.some(item=>item.id===id);

}

function addToCart(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    let cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

    const existing = cart.find(item=>item.id===id);

    const product = allproducts.find(p=>p.id===id);

    if(existing){

        existing.quantity++;

    }

    else{

        cart.push({

            ...product,

            quantity:1

        });

    }

    localStorage.setItem(`cart_${currentUser.id}`,JSON.stringify(cart));

    updateCounts();

    displayProducts();

}

function addWishlist(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    let wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

    if(wishlist.some(item=>item.id===id)){

        return;

    }

    const product = allproducts.find(p=>p.id===id);

    wishlist.push(product);

    localStorage.setItem(`wishlist_${currentUser.id}`,JSON.stringify(wishlist));

    updateCounts();

    displayProducts();

}

function updateCounts(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser) return;

    const cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

    const wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

    let total = 0;

    cart.forEach(item=>{

        total += item.quantity;

    });

}

function goCart(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    window.location.href="cart.html";

}

function updateNavbar(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(currentUser){

        document.getElementById("accountBtn").innerHTML = currentUser.name;

    }

}

function accountAction(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(currentUser){

        window.location.href="profile.html";

    }

    else{

        window.location.href="login.html";

    }

}

</script>
