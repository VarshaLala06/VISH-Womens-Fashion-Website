<h1 class="title">

✨ New Arrivals ✨

</h1>

<div class="container">

<div class="row" id="products">

</div>

<script src="js/productsData.js"></script>

<script>

const latestProducts = allproducts.slice(-6).reverse();

displayProducts();
updateCounts();

function displayProducts() {

    let data = "";

    latestProducts.forEach(product => {

        data += `

        <div class="col-md-4 mb-4">

            <div class="card shadow h-100 position-relative">

                <div class="badge-new">
                    NEW
                </div>

                <img
                    src="${product.image}"
                    class="card-img-top"
                    style="cursor:pointer;"
                    onclick="openProduct(${product.id})">

                <div class="card-body d-flex flex-column">

                    <h5>${product.name}</h5>

                    <p class="text-muted">
                        ${product.category}
                    </p>

                    <div class="price">
                        ₹${product.price}
                    </div>

                    <p>
                        ${product.description}
                    </p>

                    <div class="mt-auto">

                        <button
                            class="btn btn-dark w-100 mb-2"
                            onclick="addToCart(${product.id})">

                            Add To Cart

                        </button>

                        <button
                            class="btn btn-outline-danger w-100"
                            onclick="addWishlist(${product.id})">

                            ❤ Add To Wishlist

                        </button>

                    </div>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("products").innerHTML = data;

}

// --------------------------
// Open Product Details
// --------------------------

function openProduct(id){

    window.location.href = `product.html?id=${id}`;

}

// --------------------------
// Add To Cart
// --------------------------

function addToCart(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href = "login.html";

        return;

    }

    let cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

    const product = allproducts.find(p => p.id === id);

    const existing = cart.find(item => item.id === id);

    if(existing){

        existing.quantity++;

    }
    else{

        cart.push({
            ...product,
            quantity:1
        });

    }

    localStorage.setItem(`cart_${currentUser.id}`,JSON.stringify(cart));

    updateCounts();

    alert("Product Added To Cart");

}

// --------------------------
// Add Wishlist
// --------------------------

function addWishlist(id){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href = "login.html";

        return;

    }

    let wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

    const exists = wishlist.find(item => item.id === id);

    if(exists){

        alert("Already in Wishlist");

        return;

    }

    const product = allproducts.find(p => p.id === id);

    wishlist.push(product);

    localStorage.setItem(`wishlist_${currentUser.id}`,JSON.stringify(wishlist));

    updateCounts();

    alert("Added To Wishlist");

}

// --------------------------
// Update Cart & Wishlist Count
// --------------------------

function updateCounts(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        document.getElementById("cartCount").innerHTML = 0;
        document.getElementById("wishlistCount").innerHTML = 0;

        return;

    }

    const cart = JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

    const wishlist = JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

    let totalCartItems = 0;

    cart.forEach(item=>{

        totalCartItems += item.quantity;

    });

    document.getElementById("cartCount").innerHTML = totalCartItems;

    document.getElementById("wishlistCount").innerHTML = wishlist.length;

}

// --------------------------
// Cart Navigation
// --------------------------

function goCart(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    window.location.href="cart.html";

}

// --------------------------
// Wishlist Navigation
// --------------------------

function goWishlist(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    window.location.href="wishlist.html";

}
</script>
