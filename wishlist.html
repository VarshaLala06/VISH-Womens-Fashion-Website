<h1 class="title">
My Wishlist
</h1>

<div class="container">

<div class="row">

<div class="col-lg-8">

<div id="wishlistItems"></div>

</div>

<div class="col-lg-4">

<div class="summary">

<h3>Wishlist</h3>

<hr>

<h5>

Products :

<span id="count">0</span>

</h5>

<hr>

<button
class="btn btn-danger w-100"
onclick="clearWishlist()">

Clear Wishlist

</button>

</div>

</div>

</div>

</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

    alert("Please Login First");

    window.location.href="login.html";

}

let wishlist = JSON.parse(
    localStorage.getItem(`wishlist_${currentUser.id}`)
) || [];

function saveWishlist(){

    localStorage.setItem(
        `wishlist_${currentUser.id}`,
        JSON.stringify(wishlist)
    );

}

function displayWishlist(){

    const container=document.getElementById("wishlistItems");

    container.innerHTML="";

    if(wishlist.length==0){

        container.innerHTML=`

        <div class="alert alert-warning">

        Wishlist is Empty

        </div>

        `;

        document.getElementById("count").innerHTML=0;

        return;

    }

    document.getElementById("count").innerHTML=wishlist.length;

    wishlist.forEach(product=>{

        container.innerHTML+=`

        <div class="card shadow mb-4">

            <div class="row g-0">

                <div class="col-md-4">

                    <img
                    src="${product.image}"
                    class="img-fluid rounded-start">

                </div>

                <div class="col-md-8">

                    <div class="card-body">

                        <h4>${product.name}</h4>

                        <p>${product.category}</p>

                        <h5>₹${product.price}</h5>

                        <p>${product.description}</p>

                        <button
                        class="btn btn-success me-2"
                        onclick="moveToCart(${product.id})">

                        Move To Cart

                        </button>

                        <button
                        class="btn btn-danger"
                        onclick="removeWishlist(${product.id})">

                        Remove

                        </button>

                    </div>

                </div>

            </div>

        </div>

        `;

    });

}

function removeWishlist(id){

    wishlist = wishlist.filter(product=>product.id!=id);

    saveWishlist();

    displayWishlist();

}

function moveToCart(id){

    let cart = JSON.parse(
        localStorage.getItem(`cart_${currentUser.id}`)
    ) || [];

    const product = wishlist.find(item=>item.id==id);

    const exists = cart.find(item=>item.id==id);

    if(exists){

        exists.quantity++;

    }
    else{

        cart.push({

            ...product,

            quantity:1

        });

    }

    localStorage.setItem(

        `cart_${currentUser.id}`,

        JSON.stringify(cart)

    );

    removeWishlist(id);

    alert("Moved To Cart");

}

function clearWishlist(){

    if(confirm("Clear Wishlist?")){

        wishlist=[];

        saveWishlist();

        displayWishlist();

    }

}
function checkLogin(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    const btn = document.getElementById("accountBtn");

    if(currentUser){

        btn.innerHTML = "Profile";

    }
    else{

        btn.innerHTML = "Login";

    }

}

function accountAction(){

    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(currentUser){

        window.location.href = "profile.html";

    }
    else{

        window.location.href = "login.html";

    }

}
displayWishlist();
checkLogin();
</script>
