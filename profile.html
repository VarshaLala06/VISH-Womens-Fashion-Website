<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | VISH</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f4ef;
    font-family:Arial, Helvetica, sans-serif;
}

.navbar{
    background:burlywood;
}

.navbar-brand{
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: white !important;
    font-family: Georgia, serif;
    text-transform: uppercase;
}

.profile-card{
    max-width:650px;
    margin:60px auto;
    background:white;
    border-radius:22px;
    padding:45px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.avatar{

    width:120px;
    height:120px;
    margin:auto;

    border-radius:50%;

    background:burlywood;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:48px;
    font-weight:bold;

}

.profile-card h2{

    margin-top:20px;
    font-weight:700;
    color:#444;

}

.profile-card p{

    color:#777;

}

.stats{

    display:flex;
    gap:20px;
    margin:40px 0;

}

.stat-box{

    flex:1;
    background:white;
    border:1px solid #ead8c0;
    border-radius:18px;
    padding:22px;
    text-align:center;
    transition:.3s;

}

.stat-box:hover{

    transform:translateY(-6px);
    box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.stat-box h2{

    color:burlywood;
    font-size:34px;
    margin-bottom:8px;

}

.stat-box p{

    margin:0;
    color:#777;

}

.info{

    background:#faf6f0;
    padding:18px;
    border-radius:15px;
    margin-bottom:30px;

}

.info p{

    margin:0;
    color:#555;
    font-size:17px;

}

.btn-main{

    background:burlywood;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:17px;
    font-weight:600;
    transition:.3s;

}

.btn-main:hover{

    background:#c79b5d;
    color:white;
    transform:translateY(-2px);

}

.btn-outline-main{

    background:white;
    color:burlywood;
    border:2px solid burlywood;
    border-radius:12px;
    padding:12px;
    font-size:17px;
    font-weight:600;
    transition:.3s;

}

.btn-outline-main:hover{

    background:burlywood;
    color:white;
    transform:translateY(-2px);

}

@media(max-width:768px){

.profile-card{

    margin:25px;
    padding:30px;

}

.stats{

    flex-direction:column;

}

.avatar{

    width:100px;
    height:100px;
    font-size:40px;

}

.navbar-brand{

    font-size:1.6rem;

}

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a href="index.html" class="navbar-brand">

VISH

</a>

</div>

</nav>

<div class="profile-card">

<div class="avatar" id="avatar">

V

</div>

<div class="text-center">

<h2 id="username"></h2>

<p id="email"></p>

</div>

<div class="stats">

<div class="stat-box">

<h2 id="cartItems">0</h2>

<p>Cart Items</p>

</div>

<div class="stat-box">

<h2 id="wishlistItems">0</h2>

<p>Wishlist Items</p>

</div>

</div>

<div class="info">

<p>

<strong>Email :</strong>

<span id="emailInfo"></span>

</p>

</div>

<div class="d-grid gap-3">

<button
class="btn btn-main"
onclick="window.location.href='orders.html'">

📦 My Orders

</button>

<button
class="btn btn-outline-main"
onclick="logout()">

Logout

</button>

</div>

</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

    alert("Please Login First");

    window.location.href="login.html";

}

// -------------------
// User Details
// -------------------

document.getElementById("username").innerHTML = currentUser.name;

document.getElementById("email").innerHTML = currentUser.email;

document.getElementById("emailInfo").innerHTML = currentUser.email;

document.getElementById("avatar").innerHTML =
currentUser.name.charAt(0).toUpperCase();

// -------------------
// Cart Count
// -------------------

let cart =
JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

let totalCart = 0;

cart.forEach(item=>{

    totalCart += item.quantity;

});

document.getElementById("cartItems").innerHTML = totalCart;

// -------------------
// Wishlist Count
// -------------------

let wishlist =
JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

document.getElementById("wishlistItems").innerHTML = wishlist.length;

// -------------------
// Logout
// -------------------

function logout(){

    const confirmLogout = confirm("Logout from your account?");

    if(!confirmLogout){

        return;

    }

    localStorage.removeItem("currentUser");

    alert("Logged Out Successfully");

    window.location.href="login.html";

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
