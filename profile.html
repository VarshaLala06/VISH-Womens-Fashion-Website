
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | VISH</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f4ef;
}

.navbar{
    background:burlywood;
}

.navbar-brand{
    font-size:2rem;
    font-weight:bold;
    letter-spacing:5px;
    color:white!important;
}

.profile-card{
    max-width:650px;
    margin:60px auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:burlywood;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;
    margin:auto;
}

.stats{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin:35px 0;
}

.stat-box{
    flex:1;
    background:#f8f4ef;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.stat-box h2{
    color:#b8860b;
    font-weight:bold;
}

.info p{
    font-size:18px;
    margin-bottom:10px;
}

.btn{
    border-radius:10px;
    padding:12px;
    font-size:18px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a href="index.html" class="navbar-brand">

VISH

</a>



</div>

</nav>

<div class="profile-card">

<div class="avatar" id="avatar">

V

</div>

<div class="text-center mt-4">

<h2 id="username"></h2>

<p class="text-muted" id="email"></p>

</div>

<div class="stats">

<div class="stat-box">

<h2 id="cartItems">0</h2>

<p>Cart Items</p>

</div>

<div class="stat-box">

<h2 id="wishlistItems">0</h2>

<p>Wishlist Items</p>

</div>

</div>

<div class="info">

<p>

<strong>User ID :</strong>

<span id="userid"></span>

</p>

</div>

<hr class="my-4">

<div class="d-grid gap-3">

<button
class="btn btn-primary"
onclick="window.location.href='orders.html'">

📦 My Orders

</button>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

</div>

</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){

alert("Please Login");

window.location.href="login.html";

}

document.getElementById("username").innerHTML=currentUser.name;

document.getElementById("email").innerHTML=currentUser.email;

document.getElementById("userid").innerHTML=currentUser.id;

document.getElementById("avatar").innerHTML=currentUser.name.charAt(0).toUpperCase();

const cart=JSON.parse(localStorage.getItem(`cart_${currentUser.id}`)) || [];

const wishlist=JSON.parse(localStorage.getItem(`wishlist_${currentUser.id}`)) || [];

let totalItems=0;

cart.forEach(item=>{

totalItems+=item.quantity;

});

document.getElementById("cartItems").innerHTML=totalItems;

document.getElementById("wishlistItems").innerHTML=wishlist.length;

function logout(){

if(confirm("Are you sure you want to logout?")){

localStorage.removeItem("currentUser");

window.location.href="login.html";

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
